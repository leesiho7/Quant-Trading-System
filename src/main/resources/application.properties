# MySQL 연결 설정
# Railway는 MYSQL_HOST, MYSQL_PORT, MYSQLDATABASE, MYSQLUSER, MYSQLPASSWORD 를 각각 제공합니다.
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:quant}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:12345}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 커넥션 풀 설정 (Railway 무료 플랜 커넥션 수 제한 대응)
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# Railway 포트 설정
server.port=${PORT:8080}

# JPA 설정
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# 자바 버전
java.runtime.version=17