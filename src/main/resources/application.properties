# MySQL 연결 설정 (Railway 환경 변수 이름에 맞게 수정)
# Railway에서 제공하는 MYSQL_URL 앞에 jdbc:를 붙여서 인식시켜야 합니다.
spring.datasource.url=jdbc:${MYSQL_URL:mysql://localhost:3306/quant?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:12345}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Railway 포트 설정
server.port=${PORT:8080}

# JPA 설정
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 자바 버전 (system.properties 파일이 따로 없다면 여기에 기입해도 되지만, 가급적 파일 분리 권장)
java.runtime.version=17