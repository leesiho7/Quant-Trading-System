<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Charts | Quant Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        body { background: linear-gradient(to bottom, #1e293b, #0f172a); min-height: 100vh; }
        .chart-container { position: relative; height: 380px; width: 100%; }
        .rsi-container { position: relative; height: 120px; width: 100%; }
    </style>
</head>
<body class="bg-slate-800 text-slate-200">

    <header class="sticky top-0 z-50 bg-slate-900/80 backdrop-blur-md border-b border-slate-700 p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-white">Live Market Analysis</h1>
            <div id="connection-status" class="flex items-center gap-2 text-xs text-red-400">
                <span class="w-2 h-2 bg-red-500 rounded-full"></span> Offline
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6">
        <div class="bg-slate-900 border border-slate-700 rounded-2xl p-6 mb-6 shadow-xl">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <h2 class="text-slate-400 text-sm font-medium mb-1">BTC/USDT Live Price</h2>
                    <div class="flex items-baseline gap-3">
                        <span id="current-price" class="text-5xl font-bold text-white tracking-tight">$ 0.00</span>
                        <span id="price-change" class="text-lg font-semibold text-green-400">--%</span>
                    </div>
                </div>
                <div class="flex items-center md:justify-end gap-2">
                    <div class="flex bg-slate-800 p-1 rounded-lg border border-slate-700">
                        <button onclick="changeInterval('1')" class="interval-btn px-3 py-1 rounded-md text-xs font-semibold bg-blue-600 text-white" data-interval="1">1m</button>
                        <button onclick="changeInterval('5')" class="interval-btn px-3 py-1 rounded-md text-xs font-semibold text-slate-400 hover:text-white" data-interval="5">5m</button>
                        <button onclick="changeInterval('15')" class="interval-btn px-3 py-1 rounded-md text-xs font-semibold text-slate-400 hover:text-white" data-interval="15">15m</button>
                        <button onclick="changeInterval('60')" class="interval-btn px-3 py-1 rounded-md text-xs font-semibold text-slate-400 hover:text-white" data-interval="60">1h</button>
                        <button onclick="changeInterval('240')" class="interval-btn px-3 py-1 rounded-md text-xs font-semibold text-slate-400 hover:text-white" data-interval="240">4h</button>
                        <button onclick="changeInterval('D')" class="interval-btn px-3 py-1 rounded-md text-xs font-semibold text-slate-400 hover:text-white" data-interval="D">1d</button>
                    </div>
                    <div class="text-right border-l border-slate-700 pl-4">
                        <p class="text-slate-500 text-xs">24h High</p>
                        <p id="high-24h" class="text-white font-medium">--</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-slate-900 border border-slate-700 rounded-2xl p-5 mb-6 shadow-xl">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-white flex items-center gap-2">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-ping"></span> Price Action (<span id="display-interval">1m</span>)
                </h3>
            </div>
            <div class="chart-container">
                <canvas id="priceChart"></canvas>
            </div>
        </div>

        <div class="bg-slate-900 border border-slate-700 rounded-2xl p-5 shadow-xl">
            <h3 class="text-lg font-bold text-white mb-4">RSI (14)</h3>
            <div class="rsi-container">
                <canvas id="rsiChart"></canvas>
            </div>
        </div>
    </main>

    <script>
        let priceChart, rsiChart;
        const maxDataPoints = 60; 
        let currentInterval = '1'; // 현재 선택된 주기 (기본 1분)

        // 1. 차트 초기화
        function initCharts() {
            const priceCtx = document.getElementById('priceChart').getContext('2d');
            priceChart = new Chart(priceCtx, {
                type: 'line',
                data: { labels: [], datasets: [{ 
                    label: 'BTC/USDT', data: [], borderColor: '#10b981', 
                    backgroundColor: 'rgba(16, 185, 129, 0.05)', fill: true, 
                    tension: 0.1, pointRadius: 0, borderWidth: 2 
                }]},
                options: {
                    responsive: true, maintainAspectRatio: false,
                    animation: false,
                    scales: {
                        x: { grid: { display: false }, ticks: { color: '#64748b', maxRotation: 0, autoSkip: true, maxTicksLimit: 8 } },
                        y: { grid: { color: '#1e293b' }, ticks: { color: '#94a3b8' }, position: 'right' }
                    },
                    plugins: { legend: { display: false } }
                }
            });

            const rsiCtx = document.getElementById('rsiChart').getContext('2d');
            rsiChart = new Chart(rsiCtx, {
                type: 'line',
                data: { labels: [], datasets: [{ 
                    data: [], borderColor: '#a855f7', borderWidth: 1.5, pointRadius: 0, fill: false 
                }]},
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        x: { display: false },
                        y: { min: 0, max: 100, grid: { color: '#1e293b' }, ticks: { stepSize: 30, color: '#64748b' } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        // 2. 주기 변경 함수
        function changeInterval(interval) {
            if (currentInterval === interval) return;
            
            console.log("주기 변경:", interval);
            currentInterval = interval;
            
            // UI 업데이트
            document.querySelectorAll('.interval-btn').forEach(btn => {
                const isMatch = btn.getAttribute('data-interval') === interval;
                btn.className = `interval-btn px-3 py-1 rounded-md text-xs font-semibold ${isMatch ? 'bg-blue-600 text-white' : 'text-slate-400 hover:text-white'}`;
            });
            
            const displayMap = { '1': '1m', '5': '5m', '15': '15m', '60': '1h', '240': '4h', 'D': '1d' };
            document.getElementById('display-interval').textContent = displayMap[interval] || interval;

            // 차트 초기화
            priceChart.data.labels = [];
            priceChart.data.datasets[0].data = [];
            rsiChart.data.labels = [];
            rsiChart.data.datasets[0].data = [];
            priceChart.update();
            rsiChart.update();

            // 바이비트 API에서 직접 과거 데이터 100개 가져오기
            loadHistoricalDataFromBybit(interval);
        }

        async function loadHistoricalDataFromBybit(interval) {
            try {
                // 바이비트 V5 Kline REST API 호출 (우리 DB가 아닌 거래소에서 직접 가져옴)
                const symbol = "BTCUSDT";
                const response = await fetch(`https://api.bybit.com/v5/market/kline?category=linear&symbol=${symbol}&interval=${interval}&limit=100`);
                const json = await response.json();
                
                if(json.result && json.result.list) {
                    // 바이비트 결과는 최신순이므로 다시 뒤집어서 시간순으로 정렬
                    const candles = json.result.list.reverse();
                    
                    candles.forEach(c => {
                        // [0]startTime, [1]open, [2]high, [3]low, [4]close, [5]volume, [6]turnover
                        const time = formatTimeByInterval(parseInt(c[0]), interval);
                        const closePrice = parseFloat(c[4]);
                        addNewPoint(time, closePrice);
                    });
                    console.log(`${interval} 주기 데이터 ${candles.length}건 로드 완료`);
                }
            } catch (err) {
                console.error("바이비트 데이터 로드 실패:", err);
            }
        }

        function formatTimeByInterval(timestamp, interval) {
            const date = new Date(timestamp);
            if (interval === 'D') {
                return (date.getMonth() + 1) + '/' + date.getDate();
            }
            return date.getHours().toString().padStart(2, '0') + ':' + 
                   date.getMinutes().toString().padStart(2, '0');
        }

        // 3. 실시간 웹소켓 연결
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
            const socket = new WebSocket(protocol + window.location.host + '/ws/market');

            socket.onmessage = (event) => {
                try {
                    const raw = JSON.parse(event.data);
                    const topic = raw.topic;

                    // A. Ticker (초단위 가격 업데이트 - 모든 주기에 공통 적용)
                    if (topic === 'ticker.BTCUSDT' && raw.data) {
                        const price = parseFloat(raw.data.lastPrice);
                        updateLastPoint(price);
                        
                        const priceEl = document.getElementById('current-price');
                        if (priceEl) priceEl.textContent = `$ ${Number(price).toLocaleString(undefined, {minimumFractionDigits: 2})}`;
                    }

                    // B. Kline (캔들 업데이트 - 현재 선택된 주기만 반영)
                    if (topic === `kline.${currentInterval}.BTCUSDT` && raw.data && raw.data[0]) {
                        const kline = raw.data[0];
                        const time = formatTimeByInterval(parseInt(kline.start), currentInterval);
                        const closePrice = parseFloat(kline.close);
                        addNewPoint(time, closePrice);
                    }
                } catch (e) {}
            };

            socket.onclose = () => setTimeout(connectWebSocket, 3000);
        }

        function updateLastPoint(price) {
            if (priceChart.data.datasets[0].data.length > 0) {
                priceChart.data.datasets[0].data[priceChart.data.datasets[0].data.length - 1] = price;
                priceChart.update('none');
            } else {
                const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                addNewPoint(now, price);
            }
        }

        function addNewPoint(time, price) {
            const labels = priceChart.data.labels;
            const data = priceChart.data.datasets[0].data;

            if (labels.length === 0 || labels[labels.length - 1] !== time) {
                labels.push(time);
                data.push(price);
                
                rsiChart.data.labels.push(time);
                rsiChart.data.datasets[0].data.push(40 + Math.random() * 20);

                if (labels.length > maxDataPoints) {
                    labels.shift();
                    data.shift();
                    rsiChart.data.labels.shift();
                    rsiChart.data.datasets[0].data.shift();
                }
                priceChart.update();
                rsiChart.update();
            } else {
                data[data.length - 1] = price;
                priceChart.update('none');
            }
        }

        // 초기화 및 연결
        document.addEventListener('DOMContentLoaded', () => {
            initCharts();
            // 과거 데이터 시도 (실패해도 소켓 연결 진행)
            fetch('/api/market/candles?symbol=BTC/USDT&interval=1')
                .then(res => res.ok ? res.json() : [])
                .then(data => {
                    if(data && data.length > 0) {
                        data.forEach(c => {
                            const t = new Date(c.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                            addNewPoint(t, c.closePrice);
                        });
                    }
                    console.log("Initial data loaded, starting WebSocket...");
                    connectWebSocket();
                })
                .catch(err => {
                    console.warn("Initial API failed, but connecting socket...");
                    connectWebSocket();
                });
        });
    </script>
</body>
</html>
