<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | KR-CN Crypto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
        }
        .input-focus:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .password-strength-bar {
            height: 4px;
            border-radius: 2px;
            transition: all 0.3s ease;
        }
        .strength-weak { width: 33%; background: #ef4444; }
        .strength-medium { width: 66%; background: #f59e0b; }
        .strength-strong { width: 100%; background: #10b981; }
    </style>
</head>
<body class="bg-slate-900">
    
    <div class="min-h-screen flex items-center justify-center px-4 py-8">
        <div class="w-full max-w-md">
            
            <div class="text-center mb-8">
                <a href="/" class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-blue-600 to-blue-700 rounded-2xl mb-4 shadow-lg shadow-blue-500/30">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                    </svg>
                </a>
                <h1 class="text-3xl font-bold text-white mb-2">Join Quant Bot</h1>
                <p class="text-slate-400">최소한의 정보로 빠르게 시작하세요</p>
            </div>

            <div class="bg-slate-800 border border-slate-700 rounded-2xl p-8 shadow-2xl">
                <form id="signupForm" onsubmit="handleSignup(event)">
                    
                    <div class="mb-4">
                        <label class="block text-sm font-semibold text-slate-300 mb-2">이메일 주소</label>
                        <input type="email" id="email" placeholder="example@email.com" required
                               class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none input-focus transition-all">
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-semibold text-slate-300 mb-2">닉네임</label>
                        <input type="text" id="nickname" placeholder="활동할 이름을 입력하세요" required
                               class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none input-focus transition-all">
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-semibold text-slate-300 mb-2">비밀번호</label>
                        <input type="password" id="password" placeholder="8자 이상 입력" required oninput="checkPasswordStrength()"
                               class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none input-focus transition-all">
                        <div class="mt-2">
                            <div class="w-full bg-slate-900 rounded-full h-1 overflow-hidden">
                                <div id="password-strength-bar" class="password-strength-bar"></div>
                            </div>
                            <p id="password-strength-text" class="text-xs text-slate-500 mt-1"></p>
                        </div>
                    </div>

                    <div class="mb-6">
                        <label class="block text-sm font-semibold text-slate-300 mb-2">비밀번호 확인</label>
                        <input type="password" id="confirmPassword" placeholder="다시 한 번 입력" required oninput="checkPasswordMatch()"
                               class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none input-focus transition-all">
                        <p id="password-match-text" class="text-xs mt-1"></p>
                    </div>

                    <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white font-bold py-3 rounded-lg shadow-lg shadow-blue-500/30 transition-all mb-4">
                        무료 회원가입
                    </button>

                    <div class="text-center">
                        <p class="text-slate-400 text-sm">이미 계정이 있으신가요? <a href="/login" class="text-blue-400 hover:underline">로그인</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function checkPasswordStrength() {
            const password = document.getElementById('password').value;
            const strengthBar = document.getElementById('password-strength-bar');
            const strengthText = document.getElementById('password-strength-text');
            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]+/)) strength++;
            if (password.match(/[0-9]+/)) strength++;
            if (password.match(/[$@#&!]+/)) strength++;

            strengthBar.className = 'password-strength-bar';
            if (strength <= 2) {
                strengthBar.classList.add('strength-weak');
                strengthText.textContent = '약함';
            } else if (strength <= 3) {
                strengthBar.classList.add('strength-medium');
                strengthText.textContent = '보통';
            } else {
                strengthBar.classList.add('strength-strong');
                strengthText.textContent = '강함';
            }
        }

        function checkPasswordMatch() {
            const pw = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const matchText = document.getElementById('password-match-text');
            if (confirm === "") { matchText.textContent = ""; return; }
            if (pw === confirm) {
                matchText.textContent = "✓ 비밀번호가 일치합니다";
                matchText.className = "text-xs text-green-400 mt-1";
            } else {
                matchText.textContent = "✗ 비밀번호가 일치하지 않습니다";
                matchText.className = "text-xs text-red-400 mt-1";
            }
        }

        async function handleSignup(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const nickname = document.getElementById('nickname').value;
            const password = document.getElementById('password').value;

            // 백엔드 연결 시 Fetch API 사용 부분
            console.log("회원가입 데이터:", { email, nickname, password });
            alert(`반갑습니다, ${nickname}님! 가입이 완료되었습니다.`);
            window.location.href = '/login';
        }
    </script>
</body>
</html>
